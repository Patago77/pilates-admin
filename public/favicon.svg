<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- Fondo morado degradado -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Cabeza -->
  <circle cx="16" cy="6" r="3" fill="white"/>

  <!-- Cuerpo -->
  <line x1="16" y1="9" x2="16" y2="19" stroke="white" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Brazos arriba abiertos (V) -->
  <line x1="16" y1="12" x2="8"  y2="7"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="16" y1="12" x2="24" y2="7"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Piernas abiertas (V invertida) -->
  <line x1="16" y1="19" x2="9"  y2="28" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="23" y2="28" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
</svg>
